<!DOCTYPE html>
<html lang="zh-CN" data-theme-mode="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MKP 后处理过程</title>
  <link rel="stylesheet" href="assets/css/tailwind-compiled.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <script>
    (function() {
      try {
        const savedMode = localStorage.getItem('themeMode') || 'light';
        const isDark = savedMode === 'dark' || savedMode === 'oled' || (savedMode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme-mode', savedMode);
        if (isDark) document.documentElement.classList.add('dark');
        if (savedMode === 'oled') document.documentElement.classList.add('oled');
      } catch (error) {
        console.warn('[PostprocessReport] theme mode bootstrap failed', error);
      }

      try {
        const palette = {
          blue: '59, 130, 246',
          emerald: '16, 185, 129',
          violet: '139, 92, 246',
          orange: '245, 158, 11',
          rose: '244, 63, 94',
          pink: '236, 72, 153',
          green: '0, 174, 66',
          purple: '168, 85, 247'
        };
        const savedColor = localStorage.getItem('appThemeColor') || 'blue';
        if (savedColor === 'custom') {
          const customRgb = localStorage.getItem('customThemeRgb') || '59, 130, 246';
          document.documentElement.style.setProperty('--primary-rgb', customRgb);
        } else if (palette[savedColor]) {
          document.documentElement.style.setProperty('--primary-rgb', palette[savedColor]);
        }
      } catch (error) {
        console.warn('[PostprocessReport] theme color bootstrap failed', error);
      }
    })();
  </script>
  <style>
    :root {
      --report-bg: var(--bg-page);
      --report-panel: var(--bg-card);
      --report-panel-strong: var(--bg-card);
      --report-panel-muted: var(--bg-input);
      --report-shell-bg:
        linear-gradient(180deg, rgba(var(--primary-rgb), 0.045) 0%, rgba(var(--primary-rgb), 0.015) 170px, rgba(0, 0, 0, 0) 100%),
        var(--bg-card);
      --report-line: rgba(var(--primary-rgb), 0.08);
      --report-accent: rgb(var(--primary-rgb));
      --report-accent-soft: rgba(var(--primary-rgb), 0.14);
      --report-success: #10b981;
      --report-warning: #f59e0b;
      --report-danger: #ef4444;
      --report-text: var(--text-primary);
      --report-muted: var(--text-secondary);
      --report-border: var(--border);
      --report-shadow: var(--shadow-card);
    }

    html.dark {
      --report-panel: var(--bg-card);
      --report-panel-strong: var(--bg-card);
      --report-panel-muted: var(--bg-page);
      --report-shell-bg:
        linear-gradient(180deg, rgba(255, 255, 255, 0.02) 0%, rgba(255, 255, 255, 0.006) 170px, rgba(0, 0, 0, 0) 100%),
        var(--bg-card);
      --report-line: rgba(255, 255, 255, 0.05);
      --report-shadow: 0 20px 56px rgba(0, 0, 0, 0.32);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-width: 0 !important;
      font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei UI", "Microsoft YaHei", sans-serif;
      color: var(--report-text);
      background:
        linear-gradient(180deg, rgba(var(--primary-rgb), 0.06) 0%, rgba(var(--primary-rgb), 0.02) 150px, rgba(0, 0, 0, 0) 280px),
        var(--report-bg);
      overflow: auto;
    }

    .report-root {
      position: relative;
      min-height: 100vh;
      padding: 16px;
    }

    .report-root::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--report-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--report-line) 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.18;
      pointer-events: none;
    }

    .report-shell {
      position: relative;
      z-index: 1;
      min-height: calc(100vh - 32px);
      display: flex;
      flex-direction: column;
      gap: 14px;
      border-radius: 22px;
      border: 1px solid var(--report-border);
      background: var(--report-shell-bg);
      box-shadow: var(--report-shadow);
      padding: 16px;
      overflow: visible;
    }

    .report-topbar,
    .report-summary,
    .report-actions,
    .report-metrics,
    .detail-toolbar,
    .detail-metadata {
      display: flex;
      gap: 12px;
    }

    .report-topbar {
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .report-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1 1 260px;
      min-width: 0;
    }

    .report-brand-mark {
      width: 46px;
      height: 46px;
      border-radius: 16px;
      background:
        radial-gradient(circle at 30% 28%, rgba(255, 255, 255, 0.88) 0%, rgba(255, 255, 255, 0.16) 32%, rgba(255, 255, 255, 0) 56%),
        rgba(var(--primary-rgb), 0.12);
      border: 1px solid rgba(var(--primary-rgb), 0.22);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.28),
        0 12px 24px rgba(0, 0, 0, 0.12);
      overflow: hidden;
      flex-shrink: 0;
    }

    .report-brand-mark img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .report-brand-copy {
      min-width: 0;
    }

    .report-brand-copy small {
      display: block;
      color: var(--report-muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-size: 11px;
      margin-bottom: 4px;
    }

    .report-brand-copy strong {
      display: block;
      font-size: 16px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      border: 1px solid transparent;
      flex-shrink: 0;
      margin-left: auto;
    }

    .status-running {
      background: rgba(var(--primary-rgb), 0.14);
      color: var(--report-accent);
      border-color: rgba(var(--primary-rgb), 0.22);
    }

    .status-completed {
      background: rgba(64, 201, 150, 0.14);
      color: var(--report-success);
      border-color: rgba(64, 201, 150, 0.24);
    }

    .status-failed {
      background: rgba(239, 107, 115, 0.14);
      color: var(--report-danger);
      border-color: rgba(239, 107, 115, 0.24);
    }

    .report-summary {
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .report-summary-copy {
      min-width: 0;
      flex: 1 1 360px;
    }

    .report-summary-copy h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .report-summary-copy p {
      margin: 8px 0 0;
      color: var(--report-muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .report-actions {
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
      flex-shrink: 0;
      flex: 1 1 220px;
      max-width: 100%;
    }

    .report-btn {
      appearance: none;
      border: 1px solid var(--report-border);
      background: var(--bg-card);
      color: var(--report-text);
      border-radius: 14px;
      padding: 11px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
      min-width: 0;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, color 0.18s ease;
    }

    .report-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(var(--primary-rgb), 0.48);
      background: var(--bg-input);
    }

    .report-btn-primary {
      background: rgb(var(--primary-rgb));
      border-color: rgb(var(--primary-rgb));
      color: #ffffff;
      box-shadow: var(--shadow-button);
    }

    .report-btn-primary:hover {
      background: rgba(var(--primary-rgb), 0.92);
      color: #ffffff;
    }

    .report-btn[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .report-progress {
      border-radius: 18px;
      border: 1px solid var(--report-border);
      background: linear-gradient(180deg, var(--report-panel-strong) 0%, var(--report-panel) 100%);
      box-shadow: var(--shadow-card);
      padding: 14px 16px;
      display: grid;
      gap: 10px;
    }

    .progress-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .progress-copy {
      min-width: 0;
      flex: 1 1 300px;
    }

    .progress-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .progress-label {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;
    }

    .progress-detail,
    .progress-step {
      font-size: 12px;
      line-height: 1.6;
      color: var(--report-muted);
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .progress-step {
      min-width: 220px;
      text-align: right;
    }

    .progress-percent {
      font-size: 14px;
      font-weight: 800;
      color: var(--report-accent);
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    .progress-track {
      position: relative;
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: rgba(var(--primary-rgb), 0.10);
      overflow: hidden;
      border: 1px solid rgba(var(--primary-rgb), 0.14);
    }

    .progress-fill {
      position: relative;
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background:
        linear-gradient(90deg, rgba(var(--primary-rgb), 0.78) 0%, rgb(var(--primary-rgb)) 58%, rgba(255, 255, 255, 0.92) 100%);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.10),
        0 8px 18px rgba(var(--primary-rgb), 0.22);
    }

    .progress-lifecycle {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .progress-stage {
      --stage-progress: 0%;
      position: relative;
      min-width: 132px;
      flex: 1 1 0;
      padding: 11px 12px 16px;
      border-radius: 14px;
      border: 1px solid var(--report-border);
      background: linear-gradient(180deg, var(--report-panel) 0%, var(--report-panel-muted) 100%);
      overflow: hidden;
      color: var(--report-muted);
      transition:
        border-color 0.18s ease,
        background 0.18s ease,
        box-shadow 0.18s ease,
        color 0.18s ease,
        transform 0.18s ease;
    }

    .progress-stage::before,
    .progress-stage::after {
      content: "";
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 8px;
      height: 4px;
      border-radius: 999px;
    }

    .progress-stage::before {
      background: rgba(var(--primary-rgb), 0.10);
    }

    .progress-stage::after {
      right: auto;
      width: var(--stage-progress);
      background: linear-gradient(90deg, rgba(var(--primary-rgb), 0.78) 0%, rgb(var(--primary-rgb)) 100%);
      box-shadow: 0 4px 10px rgba(var(--primary-rgb), 0.20);
      transition: width 0.18s ease;
    }

    .progress-stage-title {
      display: block;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.4;
      color: inherit;
    }

    .progress-stage-range {
      display: block;
      margin-top: 4px;
      font-size: 11px;
      line-height: 1.4;
      color: inherit;
      opacity: 0.78;
      font-variant-numeric: tabular-nums;
    }

    .progress-stage.is-active {
      color: var(--report-text);
      border-color: rgba(var(--primary-rgb), 0.28);
      background: linear-gradient(180deg, rgba(var(--primary-rgb), 0.10) 0%, rgba(var(--primary-rgb), 0.05) 100%);
      box-shadow: var(--shadow-card);
      transform: translateY(-1px);
    }

    .progress-stage.is-complete {
      color: var(--report-text);
      border-color: rgba(var(--primary-rgb), 0.18);
      background: linear-gradient(180deg, rgba(var(--primary-rgb), 0.08) 0%, rgba(var(--primary-rgb), 0.04) 100%);
    }

    .report-progress.is-failed .progress-stage::before {
      background: rgba(239, 68, 68, 0.10);
    }

    .report-progress.is-failed .progress-stage::after {
      background: linear-gradient(90deg, rgba(239, 68, 68, 0.76) 0%, #ef4444 100%);
      box-shadow: 0 4px 10px rgba(239, 68, 68, 0.18);
    }

    .report-progress.is-failed .progress-stage.is-active {
      border-color: rgba(239, 68, 68, 0.24);
      background: linear-gradient(180deg, rgba(239, 68, 68, 0.10) 0%, rgba(239, 68, 68, 0.05) 100%);
    }

    .report-progress.is-failed .progress-stage.is-complete {
      border-color: rgba(239, 68, 68, 0.18);
      background: linear-gradient(180deg, rgba(239, 68, 68, 0.08) 0%, rgba(239, 68, 68, 0.04) 100%);
    }

    .progress-fill::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.34) 50%, rgba(255, 255, 255, 0) 100%);
      transform: translateX(-100%);
      animation: report-progress-shimmer 1.4s linear infinite;
    }

    .report-progress.is-completed .progress-fill::after,
    .report-progress.is-failed .progress-fill::after {
      animation-duration: 2.2s;
    }

    .report-progress.is-failed .progress-percent {
      color: var(--report-danger);
    }

    .report-progress.is-failed .progress-track {
      background: rgba(239, 68, 68, 0.10);
      border-color: rgba(239, 68, 68, 0.18);
    }

    .report-progress.is-failed .progress-fill {
      background: linear-gradient(90deg, rgba(239, 68, 68, 0.76) 0%, #ef4444 68%, rgba(255, 255, 255, 0.92) 100%);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.10),
        0 8px 18px rgba(239, 68, 68, 0.20);
    }

    @keyframes report-progress-shimmer {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(100%);
      }
    }

    .report-metrics {
      flex-wrap: wrap;
    }

    .metric-card,
    .detail-card,
    .step-card {
      border-radius: 18px;
      border: 1px solid var(--report-border);
      background: linear-gradient(180deg, var(--report-panel-strong) 0%, var(--report-panel) 100%);
      box-shadow: var(--shadow-card);
    }

    .metric-card {
      min-width: 140px;
      flex: 1 1 0;
      padding: 14px 16px;
    }

    .metric-label {
      font-size: 11px;
      color: var(--report-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .metric-value {
      margin-top: 10px;
      font-size: 24px;
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.03em;
      white-space: normal;
    }

    .metric-sub {
      margin-top: 6px;
      font-size: 12px;
      color: var(--report-muted);
      line-height: 1.5;
    }

    .detail-panel {
      display: none;
      min-height: 0;
      flex: 1;
      flex-direction: column;
      gap: 12px;
      overflow: visible;
    }

    .detail-panel.is-visible {
      display: flex;
    }

    .detail-toolbar {
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .view-toggle-group {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px;
      border-radius: 16px;
      background: var(--bg-input);
      border: 1px solid var(--report-border);
    }

    .view-toggle-btn {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--report-muted);
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .view-toggle-btn.is-active {
      color: var(--report-text);
      background: rgba(var(--primary-rgb), 0.14);
    }

    .detail-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .detail-metadata {
      flex-wrap: wrap;
    }

    .detail-card {
      flex: 1 1 260px;
      padding: 14px 16px;
      min-width: 220px;
    }

    .detail-card strong {
      display: block;
      font-size: 12px;
      letter-spacing: 0.08em;
      color: var(--report-muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .detail-card code,
    .step-technical pre {
      font-family: "Cascadia Code", "Consolas", monospace;
    }

    .detail-card code {
      display: block;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
      color: var(--report-text);
      font-size: 12px;
      line-height: 1.6;
    }

    .steps-container {
      flex: 1;
      min-height: 0;
      overflow: visible;
      padding-right: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .step-card {
      padding: 14px 16px;
    }

    .step-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .step-index {
      width: 28px;
      height: 28px;
      border-radius: 12px;
      background: rgba(var(--primary-rgb), 0.16);
      color: var(--report-accent);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      flex-shrink: 0;
    }

    .step-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.45;
      margin: 0;
    }

    .step-kind {
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      color: var(--report-muted);
      background: rgba(var(--primary-rgb), 0.08);
      border: 1px solid rgba(var(--primary-rgb), 0.12);
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .step-body {
      font-size: 13px;
      line-height: 1.7;
      color: var(--report-text);
    }

    .step-technical pre {
      margin: 0;
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--report-panel-muted);
      color: var(--report-text);
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
      border: 1px solid var(--report-border);
    }

    .step-data {
      margin-top: 10px;
    }

    .step-data pre {
      margin: 0;
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--report-panel-muted);
      color: var(--report-muted);
      font-size: 11px;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
      border: 1px solid var(--report-border);
    }

    .feedback {
      min-height: 20px;
      font-size: 12px;
      color: var(--report-muted);
    }

    .report-summary-copy h1,
    .report-summary-copy p,
    .feedback,
    .metric-value,
    .metric-sub,
    .step-title,
    .step-body {
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    #metricOutput,
    #metricScan {
      font-size: clamp(20px, 3.4vw, 24px);
      line-height: 1.18;
    }

    #metricOutputSub,
    #pathSummary,
    #summaryCode {
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .feedback.is-success {
      color: var(--report-success);
    }

    .feedback.is-error {
      color: var(--report-danger);
    }

    @media (max-width: 900px) {
      .report-summary,
      .detail-toolbar {
        flex-wrap: wrap;
      }

      .report-actions,
      .detail-actions {
        width: 100%;
        justify-content: flex-start;
      }

      .progress-step {
        min-width: 0;
        width: 100%;
        text-align: left;
      }
    }

    @media (max-width: 720px) {
      .report-root {
        padding: 12px;
      }

      .report-shell {
        min-height: calc(100vh - 24px);
        border-radius: 18px;
        padding: 14px;
      }

      .report-brand-copy strong {
        white-space: normal;
        overflow: visible;
        text-overflow: clip;
      }

      .report-summary-copy h1 {
        font-size: 22px;
      }

      .report-actions > .report-btn,
      .detail-actions > .report-btn {
        flex: 1 1 calc(50% - 6px);
      }

      .view-toggle-group {
        width: 100%;
        justify-content: center;
      }
    }

    @media (max-width: 560px) {
      .report-summary-copy h1 {
        font-size: 20px;
      }

      .metric-card,
      .detail-card {
        flex-basis: 100%;
      }

      .report-actions > .report-btn,
      .detail-actions > .report-btn,
      .view-toggle-group,
      .view-toggle-btn {
        width: 100%;
      }

      .view-toggle-group {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="report-root">
    <div class="report-shell">
      <div class="report-topbar">
        <div class="report-brand">
          <div class="report-brand-mark">
            <img src="assets/images/logo-main.webp" alt="MKP logo">
          </div>
          <div class="report-brand-copy">
            <small>Post-processing</small>
            <strong id="reportWindowTitle">后处理进行中</strong>
          </div>
        </div>
        <div id="statusBadge" class="status-badge status-running">运行中</div>
      </div>

      <div class="report-summary">
        <div class="report-summary-copy">
          <h1 id="summaryTitle">正在扫描支撑面与熨烫路径</h1>
          <p id="summaryText">窗口会在处理完成后自动刷新结果；如果不点查看，默认会在 10 秒后自动关闭。</p>
          <div id="countdownText" class="feedback">处理中...</div>
        </div>
        <div class="report-actions">
          <button id="viewToggleButton" class="report-btn report-btn-primary" type="button">查看详情</button>
          <button id="closeButton" class="report-btn" type="button">关闭</button>
        </div>
      </div>

      <div id="progressPanel" class="report-progress is-running">
        <div class="progress-header">
          <div class="progress-copy">
            <div class="progress-title-row">
              <div id="progressLabel" class="progress-label">启动后处理窗口</div>
              <div id="progressPercent" class="progress-percent">0%</div>
            </div>
            <div id="progressDetail" class="progress-detail">正在准备执行环境并加载待处理的 G-code。</div>
          </div>
          <div id="progressStepText" class="progress-step">当前步骤：等待后处理开始</div>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div id="progressFill" class="progress-fill"></div>
        </div>
        <div id="progressLifecycle" class="progress-lifecycle" aria-label="后处理总进度阶段">
          <div class="progress-stage is-active" data-stage-start="0" data-stage-end="12">
            <span class="progress-stage-title">显示窗口</span>
            <small class="progress-stage-range">0-12%</small>
          </div>
          <div class="progress-stage" data-stage-start="12" data-stage-end="26">
            <span class="progress-stage-title">准备报告</span>
            <small class="progress-stage-range">12-26%</small>
          </div>
          <div class="progress-stage" data-stage-start="26" data-stage-end="72">
            <span class="progress-stage-title">扫描 G-code</span>
            <small class="progress-stage-range">26-72%</small>
          </div>
          <div class="progress-stage" data-stage-start="72" data-stage-end="100">
            <span class="progress-stage-title">生成结果</span>
            <small class="progress-stage-range">72-100%</small>
          </div>
        </div>
      </div>

      <div class="report-metrics">
        <div class="metric-card">
          <div class="metric-label">注入段数</div>
          <div id="metricInjected" class="metric-value">0</div>
          <div class="metric-sub">有效支撑段或支撑面熨烫段</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">扫描结论</div>
          <div id="metricScan" class="metric-value">等待中</div>
          <div id="metricScanSub" class="metric-sub">支撑面、熨烫、跳过统计</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">耗时</div>
          <div id="metricDuration" class="metric-value">--</div>
          <div class="metric-sub">单位：秒</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">输出文件</div>
          <div id="metricOutput" class="metric-value">待生成</div>
          <div id="metricOutputSub" class="metric-sub">处理后 G-code</div>
        </div>
      </div>

      <div id="detailPanel" class="detail-panel">
        <div class="detail-toolbar">
          <div class="view-toggle-group">
            <button id="humanViewButton" class="view-toggle-btn is-active" type="button">普通步骤</button>
            <button id="technicalViewButton" class="view-toggle-btn" type="button">代码步骤</button>
          </div>
          <div class="detail-actions">
            <button id="exportTraceButton" class="report-btn" type="button">导出步骤（代码）</button>
            <button id="exportGcodeButton" class="report-btn" type="button">导出 G-code</button>
          </div>
        </div>

        <div class="detail-metadata">
          <div class="detail-card">
            <strong>输入 / 输出</strong>
            <code id="pathSummary">等待后处理状态...</code>
          </div>
          <div class="detail-card">
            <strong>解析统计</strong>
            <code id="summaryCode">等待后处理状态...</code>
          </div>
        </div>

        <div id="stepsContainer" class="steps-container"></div>
      </div>
    </div>
  </div>

  <script src="assets/js/postprocess-report-legacy.js"></script>
</body>
</html>
