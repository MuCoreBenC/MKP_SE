<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MKP SupportE - 处理中</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #1A1D1F;
      color: #E5E7EB;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }
    
    .container {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 16px;
    }
    
    /* 顶部拖拽区域 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      -webkit-app-region: drag;  /* 允许拖拽 */
    }
    
    .title {
      font-size: 14px;
      font-weight: 600;
      color: #9CA3AF;
    }
    
    .close-btn {
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      color: #6B7280;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      -webkit-app-region: no-drag;  /* 按钮区域不可拖拽 */
      transition: all 0.2s;
    }
    
    .close-btn:hover {
      background: #374151;
      color: #F87171;
    }
    
    /* 进度条区域 */
    .progress-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .status-text {
      font-size: 13px;
      color: #9CA3AF;
      margin-bottom: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .progress-bar-container {
      width: 100%;
      height: 8px;
      background: #374151;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #3B82F6, #60A5FA);
      border-radius: 4px;
      transition: width 0.3s ease;
      width: 0%;
    }
    
    .progress-bar.success {
      background: linear-gradient(90deg, #10B981, #34D399);
    }
    
    .progress-bar.error {
      background: linear-gradient(90deg, #EF4444, #F87171);
    }
    
    .progress-percent {
      font-size: 12px;
      color: #6B7280;
      text-align: right;
    }
    
    /* 底部信息 */
    .footer {
      font-size: 11px;
      color: #4B5563;
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="title">MKP SupportE - 正在处理 G-code</span>
      <button class="close-btn" id="closeBtn" title="取消并关闭">×</button>
    </div>
    
    <div class="progress-section">
      <div class="status-text" id="statusText">准备中...</div>
      <div class="progress-bar-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="progress-percent" id="progressPercent">0%</div>
    </div>
    
    <div class="footer">
      请勿关闭此窗口，处理完成后将自动退出
    </div>
  </div>
  
  <script>
    const statusText = document.getElementById('statusText');
    const progressBar = document.getElementById('progressBar');
    const progressPercent = document.getElementById('progressPercent');
    const closeBtn = document.getElementById('closeBtn');
    
    // 关闭按钮
    closeBtn.addEventListener('click', () => {
      if (confirm('确定要取消处理吗？')) {
        window.close();
      }
    });
    
    // 监听进度更新
    window.progressAPI.onUpdate((data) => {
      const percent = data.percent || 0;
      const message = data.message || '处理中...';
      
      progressBar.style.width = percent + '%';
      progressPercent.textContent = percent + '%';
      statusText.textContent = message;
    });
    
    // 监听日志消息
    window.progressAPI.onLog((data) => {
      if (data.level === 'info') {
        statusText.textContent = data.message;
      }
    });
    
    // 监听完成事件
    window.progressAPI.onComplete((data) => {
      if (data.success) {
        progressBar.classList.add('success');
        progressBar.style.width = '100%';
        progressPercent.textContent = '100%';
        statusText.textContent = `✅ 处理完成！耗时 ${data.time}s`;
        closeBtn.style.display = 'none';  // 隐藏关闭按钮，即将自动退出
      } else {
        progressBar.classList.add('error');
        progressPercent.textContent = '失败';
        statusText.textContent = `❌ 处理失败: ${data.error || '未知错误'}`;
        closeBtn.textContent = '关闭';
      }
    });
    
    // 监听错误事件
    window.progressAPI.onError((errorMsg) => {
      progressBar.classList.add('error');
      progressPercent.textContent = '错误';
      statusText.textContent = `❌ ${errorMsg}`;
      closeBtn.textContent = '关闭';
    });
  </script>
</body>
</html>
